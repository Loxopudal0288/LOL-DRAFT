<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Турнирный драфт — League of Legends</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f0f1b;
      color: #e0e0ff;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    /* === ПИКИ === */
    .side-panel {
      position: fixed;
      width: 200px;
      top: 10px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 10;
    }
    .side-panel.left { left: 10px; }
    .side-panel.right { right: 10px; }

    .team-label {
      position: fixed;
      text-align: center;
      font-weight: bold;
      color: #8a8aff;
      font-size: 16px;
      z-index: 10;
    }
    .side-panel.left .team-label { left: 10px; top: 10px; }
    .side-panel.right .team-label { right: 10px; top: 10px; }

    .team-slots {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-top: 30px;
    }

    .slot {
      width: 200px;
      height: 100px;
      background-color: #1e1e35;
      border: 2px dashed #4a4a7a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      text-align: center;
      padding: 6px;
      color: #aaa;
      font-weight: bold;
    }
    .slot.filled {
      border-style: solid;
      border-color: #8a2be2;
      background-color: #252540;
      color: #ffffff;
    }

    /* === ЦЕНТРАЛЬНЫЙ КОНТЕЙНЕР === */
    .container {
      width: 900px;
      background-color: #151528;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 0 15px rgba(100, 0, 255, 0.3);
      border: 1px solid #3a3a6e;
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .scale-wrapper {
      transform: scale(1.2);
      transform-origin: top center;
    }

    h1 {
      text-align: center;
      color: #c9a0ff;
      margin: 8px 0;
      font-size: 24px;
      text-shadow: 0 0 8px rgba(180, 100, 255, 0.5);
    }

    .phase-info {
      color: #ffcc00;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
      font-size: 16px;
    }

    .timer {
      font-size: 20px;
      color: #ff6666;
      font-weight: bold;
      margin: 4px 0;
    }

    .champions-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
      margin-bottom: 6px;
    }

    .roles-row {
      display: flex;
      gap: 6px;
    }

    .role-cell {
      width: 40px;
      height: 40px;
      background-color: #1a1a2e;
      border: 1px solid #444;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: #a0a0ff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .role-cell:hover {
      border-color: #8a8aff;
      background-color: #22223a;
    }

    #search-input {
      width: 180px;
      padding: 6px 10px;
      background-color: #1a1a2e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0ff;
      font-size: 14px;
    }
    #search-input::placeholder { color: #666; }
    #search-input:focus {
      outline: none;
      border-color: #8a8aff;
    }

    #champions-container {
      display: grid;
      grid-template-columns: repeat(9, 75px);
      gap: 8px;
      justify-content: center;
      max-height: 360px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px;
      background-color: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #333355;
    }

    .champion-cell {
      width: 75px;
      height: 90px;
      border: 2px solid #444;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #22223a;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      font-size: 10px;
      text-align: center;
      padding: 2px;
      color: #d0d0ff;
      flex-shrink: 0;
    }
    .champion-cell:hover {
      border-color: #8a8aff;
      transform: scale(1.05);
      background-color: #2a2a45;
    }
    .champion-cell.selected {
      border-color: #ffcc00;
      background-color: #302540;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }
    .champion-cell.picked {
      opacity: 0.3;
      pointer-events: none;
    }

    .champion-cell img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 2px;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 12px 0;
    }

    .btn {
      padding: 8px 20px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      color: white;
      background: linear-gradient(to bottom, #4a90e2, #2a5db0);
    }
    .btn:hover {
      background: linear-gradient(to bottom, #5aa0f2, #3a6dc0);
      transform: translateY(-1px);
    }
    .btn.ready {
      background: linear-gradient(to bottom, #5cb85c, #3d8b3d);
    }
    .btn.ready:hover {
      background: linear-gradient(to bottom, #6cc86c, #4d9b4d);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #result {
      margin-top: 6px;
      font-size: 16px;
      font-weight: bold;
      color: #a0ffa0;
      text-align: center;
      min-height: 20px;
    }

    /* === НИЖНЯЯ СЕКЦИЯ === */
    .bottom-section {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 10;
      padding: 0 10px;
    }

    .ban-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 260px;
    }

    .ban-team .team-label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #8a8aff;
      font-size: 14px;
    }

    .bans-row {
      display: flex;
      gap: 8px;
    }
    .bans-row.blue {
      /* Blue: слева направо: BAN1 → BAN5 */
    }
    .bans-row.red {
      /* 🔥 Red: зеркально — справа налево: BAN5 ← BAN1 */
      flex-direction: row-reverse;
    }

    .bans-row .slot {
      width: 85px;
      height: 85px;
      font-size: 11px;
      background-color: #1e1e35;
      border: 2px dashed #4a4a7a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-weight: bold;
      flex-shrink: 0;
    }
    .bans-row .slot.filled {
      border-style: solid;
      border-color: #8a2be2;
      background-color: #252540;
      color: #ffffff;
    }

    /* === ЦЕНТРАЛЬНЫЕ ССЫЛКИ === */
    .center-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      min-width: 220px;
    }

    .link-placeholder {
      color: #a0a0ff;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      background: #22223a;
      transition: all 0.2s;
      width: 100%;
      text-align: center;
    }
    .link-placeholder:hover {
      background: #2a2a45;
      color: #d0d0ff;
    }
  </style>
</head>
<body>

  <!-- ПИКИ -->
  <div class="side-panel left">
    <div class="team-label">Blue Team</div>
    <div id="team-blue-picks" class="team-slots">
      <div class="slot">TOP</div>
      <div class="slot">JG</div>
      <div class="slot">MID</div>
      <div class="slot">ADC</div>
      <div class="slot">SUP</div>
    </div>
    <button id="ready-blue" class="btn">Готов (Blue)</button>
  </div>

  <div class="side-panel right">
    <div class="team-label">Red Team</div>
    <div id="team-red-picks" class="team-slots">
      <div class="slot">TOP</div>
      <div class="slot">JG</div>
      <div class="slot">MID</div>
      <div class="slot">ADC</div>
      <div class="slot">SUP</div>
    </div>
    <button id="ready-red" class="btn">Готов (Red)</button>
  </div>

  <!-- ЦЕНТРАЛЬНЫЙ БЛОК -->
  <div class="container">
    <div class="scale-wrapper">
      <h1>Турнирный драфт — League of Legends</h1>
      
      <div class="phase-info" id="phase-info">Ожидание подключения второй команды...</div>
      <div class="timer" id="timer">--:--</div>

      <div class="champions-header">
        <div class="roles-row">
          <button class="role-cell">TOP</button>
          <button class="role-cell">JG</button>
          <button class="role-cell">MID</button>
          <button class="role-cell">ADC</button>
          <button class="role-cell">SUP</button>
        </div>
        <input type="text" id="search-input" placeholder="Поиск чемпиона...">
      </div>

      <div id="champions-container">
        <!-- Ячейки сгенерируются скриптом -->
      </div>

      <div class="buttons-container">
        <button id="confirm-btn" class="btn">Подтвердить выбор</button>
      </div>
      
      <div id="result"></div>
    </div>
  </div>

  <!-- 🔥 ЗЕРКАЛЬНЫЕ БАНЫ + ЦЕНТРАЛЬНЫЕ ССЫЛКИ -->
  <div class="bottom-section">
    <!-- Баны Blue -->
    <div class="ban-team">
      <div class="team-label">Баны Blue</div>
      <div class="bans-row blue" id="team-blue-bans">
        <div class="slot">BAN 1</div>
        <div class="slot">BAN 2</div>
        <div class="slot">BAN 3</div>
        <div class="slot">BAN 4</div>
        <div class="slot">BAN 5</div>
      </div>
    </div>

    <!-- Ссылки по центру -->
    <div class="center-links">
      <div id="captain-link" class="link-placeholder">Ссылка для капитана другой команды</div>
      <div id="spectator-link" class="link-placeholder">Ссылка для спектаторов</div>
    </div>

    <!-- Баны Red (зеркальные) -->
    <div class="ban-team">
      <div class="team-label">Баны Red</div>
      <div class="bans-row red" id="team-red-bans">
        <div class="slot">BAN 1</div>
        <div class="slot">BAN 2</div>
        <div class="slot">BAN 3</div>
        <div class="slot">BAN 4</div>
        <div class="slot">BAN 5</div>
      </div>
    </div>
  </div>

  <script>
    const championNames = [
      "Aatrox", "Ahri", "Akali", "Akshan", "Alistar", "Amumu", "Anivia", "Annie", "Aphelios", "Ashe",
      "Aurelion Sol", "Azir", "Bard", "Bel'Veth", "Blitzcrank", "Brand", "Braum", "Briar", "Caitlyn", "Camille",
      "Cassiopeia", "Cho'Gath", "Corki", "Darius", "Diana", "Dr. Mundo", "Draven", "Ekko", "Elise", "Evelynn",
      "Ezreal", "Fiddlesticks", "Fiora", "Fizz", "Galio", "Gangplank", "Garen", "Gnar", "Gragas", "Graves",
      "Gwen", "Hecarim", "Heimerdinger", "Illaoi", "Irelia", "Ivern", "Janna", "Jarvan IV", "Jax", "Jayce",
      "Jhin", "Jinx", "K'Sante", "Kai'Sa", "Kalista", "Karma", "Karthus", "Kassadin", "Katarina", "Kayle",
      "Kayn", "Kennen", "Kha'Zix", "Kindred", "Kled", "Kog'Maw", "LeBlanc", "Lee Sin", "Leona", "Lillia",
      "Lissandra", "Lucian", "Lulu", "Lux", "Malphite", "Malzahar", "Maokai", "Master Yi", "Milio", "Miss Fortune",
      "Mordekaiser", "Morgana", "Naafiri", "Nami", "Nasus", "Nautilus", "Neeko", "Nidalee", "Nilah", "Nocturne",
      "Nunu & Willump", "Olaf", "Orianna", "Ornn", "Pantheon", "Poppy", "Pyke", "Qiyana", "Quinn", "Rakan",
      "Rammus", "Rek'Sai", "Rell", "Renata Glasc", "Renekton", "Rengar", "Riven", "Rumble", "Ryze", "Samira",
      "Sejuani", "Senna", "Seraphine", "Sett", "Shaco", "Shen", "Shyvana", "Singed", "Sion", "Sivir",
      "Skarner", "Smolder", "Sona", "Soraka", "Swain", "Sylas", "Syndra", "Tahm Kench", "Taliyah", "Talon",
      "Taric", "Teemo", "Thresh", "Tristana", "Trundle", "Tryndamere", "Twisted Fate", "Twitch", "Udyr", "Urgot",
      "Varus", "Vayne", "Veigar", "Vel'Koz", "Vex", "Vi", "Viego", "Viktor", "Vladimir", "Volibear",
      "Warwick", "Wukong", "Xayah", "Xerath", "Xin Zhao", "Yasuo", "Yone", "Yorick", "Yuumi", "Zac",
      "Zed", "Zeri", "Ziggs", "Zilean", "Zoe", "Zyra"
    ].sort();

    let draftId = null;
    let mySide = null;
    let state = null;
    let selectedCell = null;
    let timerInterval = null;
    let timeLeft = 0;
    let iAmReady = false;
    let lastPhase = null;

    const container = document.getElementById("champions-container");
    const phaseInfo = document.getElementById("phase-info");
    const timerEl = document.getElementById("timer");
    const confirmBtn = document.getElementById("confirm-btn");
    const readyBlueBtn = document.getElementById("ready-blue");
    const readyRedBtn = document.getElementById("ready-red");
    const captainLinkEl = document.getElementById("captain-link");
    const spectatorLinkEl = document.getElementById("spectator-link");

    function init() {
      const urlParams = new URLSearchParams(window.location.search);
      draftId = urlParams.get('draft_id');
      mySide = urlParams.get('side');

      if (!draftId || !mySide) {
        alert("Неверная ссылка! Используйте ссылку от создателя комнаты.");
        return;
      }

      renderChampions();
      setupEventListeners();
      syncAndRender();
      setInterval(syncAndRender, 1000);
    }

    function renderChampions() {
      container.innerHTML = '';
      championNames.forEach(name => {
        const cell = document.createElement("div");
        cell.classList.add("champion-cell");

        let key = name
          .replace(/ /g, "")
          .replace(/'/g, "")
          .replace(/\./g, "")
          .replace(/&/g, "");

        const img = document.createElement("img");
        img.src = `/static/icons/${key}.png`;
        img.alt = name;
        img.onerror = () => {
          img.style.display = "none";
          console.warn(`Иконка не найдена: ${key}.png`);
        };

        const label = document.createElement("div");
        label.textContent = name;

        cell.appendChild(img);
        cell.appendChild(label);
        container.appendChild(cell);
      });
    }

    function setupEventListeners() {
      document.getElementById("search-input").addEventListener("input", (e) => {
        const query = e.target.value.trim().toLowerCase();
        document.querySelectorAll(".champion-cell").forEach(cell => {
          const name = cell.querySelector("div").textContent.toLowerCase();
          cell.style.display = name.includes(query) ? "flex" : "none";
        });
      });

      document.querySelectorAll(".champion-cell").forEach(cell => {
        cell.addEventListener("click", () => {
          if (selectedCell) selectedCell.classList.remove("selected");
          cell.classList.add("selected");
          selectedCell = cell;
        });
      });

      confirmBtn.onclick = handleConfirm;
      readyBlueBtn.onclick = () => setReady("blue");
      readyRedBtn.onclick = () => setReady("red");

      captainLinkEl.onclick = () => {
        if (!draftId) return;
        const joinLink = `${window.location.origin}/join?draft_id=${draftId}`;
        copyTextToClipboard(joinLink, captainLinkEl);
      };

      spectatorLinkEl.onclick = () => {
        if (!draftId) return;
        const spectatorLink = `${window.location.origin}/draft?draft_id=${draftId}&side=spectator`;
        copyTextToClipboard(spectatorLink, spectatorLinkEl);
      };
    }

    async function copyTextToClipboard(text, element) {
      try {
        await navigator.clipboard.writeText(text);
        const originalText = element.textContent;
        element.textContent = "Скопировано!";
        element.style.color = "#5cb85c";
        setTimeout(() => {
          element.textContent = originalText;
          element.style.color = "#a0a0ff";
        }, 2000);
      } catch (err) {
        alert("Не удалось скопировать ссылку");
      }
    }

    async function syncAndRender() {
      try {
        const res = await fetch(`/api/draft/${draftId}`);
        if (!res.ok) return;
        state = await res.json();
        updateUI();
        updateLinkVisibility();
      } catch (e) {
        console.error("Failed to sync state", e);
      }
    }

    function updateLinkVisibility() {
      if (!state || !draftId) return;

      if (state.phase === "lobby" || state.phase === "ready_check") {
        captainLinkEl.style.display = "block";
      } else {
        captainLinkEl.style.display = "none";
      }

      if (state.phase !== "lobby" && state.phase !== "ready_check") {
        spectatorLinkEl.style.display = "block";
      } else {
        spectatorLinkEl.style.display = "none";
      }
    }

    function updateUI() {
      if (!state) return;

      if (lastPhase !== state.phase) {
        lastPhase = state.phase;
        stopTimer();
        timeLeft = 0;
      }

      if (mySide === "blue") {
        readyBlueBtn.disabled = !(state.phase === "ready_check" && !iAmReady);
        readyRedBtn.style.display = "none";
      } else if (mySide === "red") {
        readyRedBtn.disabled = !(state.phase === "ready_check" && !iAmReady);
        readyBlueBtn.style.display = "none";
      }

      let phaseText = "";
      switch (state.phase) {
        case "lobby": phaseText = "Ожидание второй команды..."; break;
        case "ready_check": phaseText = "Подтвердите готовность"; break;
        case "banning_1": phaseText = "Фаза банов 1"; break;
        case "picking_1": phaseText = "Фаза пиков 1"; break;
        case "banning_2": phaseText = "Фаза банов 2"; break;
        case "picking_2": phaseText = "Фаза пиков 2"; break;
        case "finished": phaseText = "Драфт завершён!"; break;
        default: phaseText = "Драфт в процессе";
      }
      phaseInfo.textContent = phaseText;

      const isMyTurn = state.current_turn === mySide;
      const isActivePhase = ["banning_1", "picking_1", "banning_2", "picking_2"].includes(state.phase);
      confirmBtn.disabled = !isMyTurn || !isActivePhase || !selectedCell;

      updateSlots("blue", state.picks_blue);
      updateSlots("red", state.picks_red);

      const blueBans = state.bans.filter((_, i) => i % 2 === 0).slice(0, 5);
      const redBans = state.bans.filter((_, i) => i % 2 === 1).slice(0, 5);
      updateBans("blue", blueBans);
      updateBans("red", redBans);

      const bannedOrPicked = new Set([
        ...state.bans,
        ...state.picks_blue.filter(p => p),
        ...state.picks_red.filter(p => p)
      ]);
      document.querySelectorAll(".champion-cell").forEach(cell => {
        const name = cell.querySelector("div").textContent;
        if (bannedOrPicked.has(name)) {
          cell.classList.add("picked");
        } else {
          cell.classList.remove("picked");
        }
      });

      if (isActivePhase && isMyTurn) {
        startTimer();
      } else {
        stopTimer();
        timerEl.textContent = "--:--";
      }
    }

    function updateSlots(side, picks) {
      const slots = document.querySelectorAll(`#team-${side}-picks .slot`);
      picks.forEach((champ, i) => {
        const slot = slots[i];
        if (champ) {
          slot.textContent = champ;
          slot.classList.add("filled");
        } else {
          slot.textContent = ["TOP", "JG", "MID", "ADC", "SUP"][i];
          slot.classList.remove("filled");
        }
      });
    }

    function updateBans(side, bans) {
      const slots = document.querySelectorAll(`#team-${side}-bans .slot`);
      bans.forEach((champ, i) => {
        slots[i].textContent = champ;
        slots[i].classList.add("filled");
      });
      for (let i = bans.length; i < 5; i++) {
        slots[i].textContent = `BAN ${i + 1}`;
        slots[i].classList.remove("filled");
      }
    }

    function startTimer() {
      if (timeLeft <= 0) timeLeft = 35;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) {
          stopTimer();
        }
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    async function setReady(side) {
      if (side !== mySide) return;
      try {
        await fetch(`/api/draft/${draftId}/ready`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ team: side })
        });
        iAmReady = true;
        updateUI();
      } catch (e) {
        console.error("Failed to set ready", e);
      }
    }

    async function handleConfirm() {
      if (!selectedCell) return;
      const name = selectedCell.querySelector("div").textContent;

      selectedCell.classList.add("picked");
      selectedCell.style.pointerEvents = "none";
      selectedCell = null;

      try {
        await fetch(`/api/draft/${draftId}/action`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ champion: name })
        });
      } catch (e) {
        document.querySelectorAll(".champion-cell").forEach(cell => {
          if (cell.querySelector("div").textContent === name) {
            cell.classList.remove("picked");
            cell.style.pointerEvents = "";
          }
        });
        document.getElementById("result").textContent = "Ошибка! Повторите попытку.";
      }
    }

    window.onload = init;
  </script>
