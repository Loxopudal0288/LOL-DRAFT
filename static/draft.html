<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Турнирный драфт — League of Legends</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f0f1b;
      color: #e0e0ff;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    /* === ПИКИ === */
    .side-panel {
      position: fixed;
      width: 200px;
      top: 10px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 10;
    }
    .side-panel.left { left: 10px; }
    .side-panel.right { right: 10px; }

    .team-label {
      position: fixed;
      text-align: center;
      font-weight: bold;
      color: #8a8aff;
      font-size: 16px;
      z-index: 10;
    }
    .side-panel.left .team-label { left: 10px; top: 10px; }
    .side-panel.right .team-label { right: 10px; top: 10px; }

    .team-slots {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-top: 30px;
    }

    .slot {
      width: 200px;
      height: 100px;
      background-color: #1e1e35;
      border: 2px dashed #4a4a7a;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      text-align: center;
      padding: 6px;
      color: #aaa;
      font-weight: bold;
    }
    .slot.filled {
      border-style: solid;
      border-color: #8a2be2;
      background-color: #252540;
      color: #ffffff;
    }
    
    .slot img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }
    
    .slot .champion-name {
      font-size: 12px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* === ЦЕНТРАЛЬНЫЙ КОНТЕЙНЕР === */
    .container {
      width: 900px;
      background-color: #151528;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 0 15px rgba(100, 0, 255, 0.3);
      border: 1px solid #3a3a6e;
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .scale-wrapper {
      transform: scale(1.2);
      transform-origin: top center;
    }

    h1 {
      text-align: center;
      color: #c9a0ff;
      margin: 8px 0;
      font-size: 24px;
      text-shadow: 0 0 8px rgba(180, 100, 255, 0.5);
    }

    .phase-info {
      color: #ffcc00;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
      font-size: 16px;
    }

    .timer {
      font-size: 20px;
      color: #ff6666;
      font-weight: bold;
      margin: 4px 0;
    }

    .champions-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
      margin-bottom: 6px;
    }

    .roles-row {
      display: flex;
      gap: 6px;
    }

    .role-cell {
      width: 40px;
      height: 40px;
      background-color: #1a1a2e;
      border: 1px solid #444;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: #a0a0ff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .role-cell:hover, .role-cell.active {
      border-color: #8a8aff;
      background-color: #22223a;
      color: #fff;
    }
    .role-cell.active {
      border-color: #ffcc00;
      box-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
    }

    #search-input {
      width: 180px;
      padding: 6px 10px;
      background-color: #1a1a2e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0ff;
      font-size: 14px;
    }
    #search-input::placeholder { color: #666; }
    #search-input:focus {
      outline: none;
      border-color: #8a8aff;
    }

    #champions-container {
      display: grid;
      grid-template-columns: repeat(9, 75px);
      gap: 8px;
      justify-content: center;
      max-height: 360px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px;
      background-color: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #333355;
    }

    .champion-cell {
      width: 75px;
      height: 90px;
      border: 2px solid #444;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #22223a;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      font-size: 10px;
      text-align: center;
      padding: 2px;
      color: #d0d0ff;
      flex-shrink: 0;
    }
    .champion-cell:hover {
      border-color: #8a8aff;
      transform: scale(1.05);
      background-color: #2a2a45;
    }
    .champion-cell.selected {
      border-color: #ffcc00;
      background-color: #302540;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }
    .champion-cell.picked {
      opacity: 0.3;
      pointer-events: none;
    }

    .champion-cell img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 2px;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 12px 0;
    }

    .btn {
      padding: 8px 20px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      color: white;
      background: linear-gradient(to bottom, #4a90e2, #2a5db0);
    }
    .btn:hover {
      background: linear-gradient(to bottom, #5aa0f2, #3a6dc0);
      transform: translateY(-1px);
    }
    .btn.ready {
      background: linear-gradient(to bottom, #5cb85c, #3d8b3d);
    }
    .btn.ready:hover {
      background: linear-gradient(to bottom, #6cc86c, #4d9b4d);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #result {
      margin-top: 6px;
      font-size: 16px;
      font-weight: bold;
      color: #a0ffa0;
      text-align: center;
      min-height: 20px;
    }

    /* === НИЖНЯЯ СЕКЦИЯ === */
    .bottom-section {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 10;
      padding: 0 10px;
    }

    .ban-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 260px;
    }

    .ban-team .team-label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #8a8aff;
      font-size: 14px;
    }

    .bans-row {
      display: flex;
      gap: 8px;
    }
    .bans-row.blue {
    }
    .bans-row.red {
      flex-direction: row-reverse;
    }

    .bans-row .slot {
      width: 85px;
      height: 85px;
      font-size: 11px;
      background-color: #1e1e35;
      border: 2px dashed #4a4a7a;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-weight: bold;
      flex-shrink: 0;
      gap: 5px;
    }
    .bans-row .slot.filled {
      border-style: solid;
      border-color: #8a2be2;
      background-color: #252540;
      color: #ffffff;
    }
    
    .bans-row .slot img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }
    
    .bans-row .slot .champion-name {
      font-size: 9px;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* === ЦЕНТРАЛЬНЫЕ ССЫЛКИ === */
    .center-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      min-width: 220px;
    }

    .link-placeholder {
      color: #a0a0ff;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      background: #22223a;
      transition: all 0.2s;
      width: 100%;
      text-align: center;
    }
    .link-placeholder:hover {
      background: #2a2a45;
      color: #d0d0ff;
    }

    /* === ЗАГРУЗКА === */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 30px 50px;
      border-radius: 12px;
      border: 2px solid #8a8aff;
      z-index: 1000;
      text-align: center;
    }
    #loading h2 {
      color: #c9a0ff;
      margin: 0 0 15px 0;
    }
    .spinner {
      border: 4px solid #1a1a2e;
      border-top: 4px solid #8a8aff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <h2>Загрузка чемпионов...</h2>
    <div class="spinner"></div>
  </div>

  <!-- ПИКИ -->
  <div class="side-panel left">
    <div class="team-label">Blue Team</div>
    <div id="team-blue-picks" class="team-slots">
      <div class="slot"><span>TOP</span></div>
      <div class="slot"><span>JG</span></div>
      <div class="slot"><span>MID</span></div>
      <div class="slot"><span>ADC</span></div>
      <div class="slot"><span>SUP</span></div>
    </div>
    <button id="ready-blue" class="btn">Готов (Blue)</button>
  </div>

  <div class="side-panel right">
    <div class="team-label">Red Team</div>
    <div id="team-red-picks" class="team-slots">
      <div class="slot"><span>TOP</span></div>
      <div class="slot"><span>JG</span></div>
      <div class="slot"><span>MID</span></div>
      <div class="slot"><span>ADC</span></div>
      <div class="slot"><span>SUP</span></div>
    </div>
    <button id="ready-red" class="btn">Готов (Red)</button>
  </div>

  <!-- ЦЕНТРАЛЬНЫЙ БЛОК -->
  <div class="container">
    <div class="scale-wrapper">
      <h1>Турнирный драфт — League of Legends</h1>
      
      <div class="phase-info" id="phase-info">Ожидание подключения второй команды...</div>
      <div class="timer" id="timer">--:--</div>

      <div class="champions-header">
        <div class="roles-row">
          <button class="role-cell active" data-role="all">Все</button>
          <button class="role-cell" data-role="TOP">TOP</button>
          <button class="role-cell" data-role="JG">JG</button>
          <button class="role-cell" data-role="MID">MID</button>
          <button class="role-cell" data-role="ADC">ADC</button>
          <button class="role-cell" data-role="SUP">SUP</button>
        </div>
        <input type="text" id="search-input" placeholder="Поиск чемпиона...">
      </div>

      <div id="champions-container">
        <!-- Ячейки сгенерируются скриптом -->
      </div>

      <div class="buttons-container">
        <button id="confirm-btn" class="btn" disabled>Подтвердить выбор</button>
      </div>
      
      <div id="result"></div>
    </div>
  </div>

  <!-- 🔥 ЗЕРКАЛЬНЫЕ БАНЫ + ЦЕНТРАЛЬНЫЕ ССЫЛКИ -->
  <div class="bottom-section">
    <!-- Баны Blue -->
    <div class="ban-team">
      <div class="team-label">Баны Blue</div>
      <div class="bans-row blue" id="team-blue-bans">
        <div class="slot"><span>BAN 1</span></div>
        <div class="slot"><span>BAN 2</span></div>
        <div class="slot"><span>BAN 3</span></div>
        <div class="slot"><span>BAN 4</span></div>
        <div class="slot"><span>BAN 5</span></div>
      </div>
    </div>

    <!-- Ссылки по центру -->
    <div class="center-links">
      <div id="captain-link" class="link-placeholder">Ссылка для капитана другой команды</div>
      <div id="spectator-link" class="link-placeholder">Ссылка для спектаторов</div>
    </div>

    <!-- Баны Red (зеркальные) -->
    <div class="ban-team">
      <div class="team-label">Баны Red</div>
      <div class="bans-row red" id="team-red-bans">
        <div class="slot"><span>BAN 1</span></div>
        <div class="slot"><span>BAN 2</span></div>
        <div class="slot"><span>BAN 3</span></div>
        <div class="slot"><span>BAN 4</span></div>
        <div class="slot"><span>BAN 5</span></div>
      </div>
    </div>
  </div>

  <script>
    // === КОНФИГУРАЦИЯ DATADRAGON API ===
    let DDATA_VERSION = '';
    let DDATA_BASE = '';
    let CHAMPION_DATA_URL = '';
    let CHAMPION_ICON_BASE = '';

    // === МАППИНГ РОЛЕЙ ===
    const ROLE_CHAMPIONS = {
      "TOP": ["Aatrox", "Camille", "Darius", "Fiora", "Garen", "Gnar", "Illaoi", "Irelia", "Jax", "Jayce", "KSante", "Kennen", "Malphite", "Mordekaiser", "Nasus", "Ornn", "Pantheon", "Poppy", "Renekton", "Riven", "Sett", "Shen", "Singed", "Sion", "Teemo", "Trundle", "Tryndamere", "Vladimir", "MonkeyKing", "Yorick", "Gangplank", "Graves", "Urgot", "Volibear", "Yone", "Ambessa", "Aurora"],
      "JG": ["Amumu", "Belveth", "Diana", "Ekko", "Elise", "Evelynn", "Fiddlesticks", "Graves", "Hecarim", "Ivern", "JarvanIV", "Kayn", "KhaZix", "Kindred", "Kled", "LeeSin", "Lillia", "MasterYi", "Nidalee", "Nocturne", "Nunu", "Olaf", "Rammus", "RekSai", "Rengar", "Sejuani", "Shaco", "Skarner", "Taliyah", "Trundle", "Udyr", "Vi", "Viego", "Volibear", "Warwick", "MonkeyKing", "XinZhao", "Zac", "Karthus", "Aurora"],
      "MID": ["Ahri", "Akali", "Anivia", "Annie", "AurelionSol", "Azir", "Brand", "Cassiopeia", "Corki", "Diana", "Ekko", "Fizz", "Galio", "Kassadin", "Katarina", "Leblanc", "Lissandra", "Lux", "Malzahar", "Neeko", "Orianna", "Qiyana", "Ryze", "Syndra", "Talon", "TwistedFate", "Veigar", "Viktor", "Vladimir", "Xerath", "Yasuo", "Yone", "Zed", "Ziggs", "Zoe", "Zyra", "Sylas", "Aurora", "Ambessa"],
      "ADC": ["Aphelios", "Ashe", "Caitlyn", "Draven", "Ezreal", "Jhin", "Jinx", "Kaisa", "Kalista", "KogMaw", "Lucian", "MissFortune", "Nilah", "Samira", "Senna", "Sivir", "Smolder", "Tristana", "Twitch", "Varus", "Vayne", "Xayah", "Zeri", "Corki", "Ambessa"],
      "SUP": ["Alistar", "Bard", "Blitzcrank", "Brand", "Braum", "Janna", "Karma", "Leona", "Lulu", "Lux", "Morgana", "Nami", "Nautilus", "Pyke", "Rakan", "Rell", "RenataGlasc", "Senna", "Seraphine", "Soraka", "TahmKench", "Taric", "Thresh", "Yuumi", "Zilean", "Zyra", "Milio", "Ambessa", "Aurora"]
    };

    let draftId = null;
    let mySide = null;
    let state = null;
    let selectedCell = null;
    let timerInterval = null;
    let timeLeft = 35;
    let iAmReady = false;
    let lastPhase = null;
    let lastTurn = null;
    let timerRunning = false;
    let currentRoleFilter = "all";
    let allChampions = {};
    let championList = [];
    let championKeyMap = {};

    const container = document.getElementById("champions-container");
    const phaseInfo = document.getElementById("phase-info");
    const timerEl = document.getElementById("timer");
    const confirmBtn = document.getElementById("confirm-btn");
    const readyBlueBtn = document.getElementById("ready-blue");
    const readyRedBtn = document.getElementById("ready-red");
    const captainLinkEl = document.getElementById("captain-link");
    const spectatorLinkEl = document.getElementById("spectator-link");
    const loadingEl = document.getElementById("loading");

    // ✅ ПОЛУЧЕНИЕ ПОСЛЕДНЕЙ ВЕРСИИ API
    async function getLatestVersion() {
      try {
        const res = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
        if (!res.ok) throw new Error('Failed to fetch versions');
        const versions = await res.json();
        const latestVersion = versions[0];
        console.log(`📦 Последняя версия API: ${latestVersion}`);
        return latestVersion;
      } catch (error) {
        console.error('❌ Ошибка получения версии:', error);
        return '14.23.1';
      }
    }

    // ✅ ИНИЦИАЛИЗАЦИЯ API
    async function initAPI() {
      DDATA_VERSION = await getLatestVersion();
      DDATA_BASE = `https://ddragon.leagueoflegends.com/cdn/${DDATA_VERSION}`;
      CHAMPION_DATA_URL = `${DDATA_BASE}/data/ru_RU/champion.json`;
      CHAMPION_ICON_BASE = `${DDATA_BASE}/img/champion`;
      
      console.log(`🔧 DataDragon база: ${DDATA_BASE}`);
    }

    // ✅ ЗАГРУЗКА ЧЕМПИОНОВ С API
    async function loadChampionsFromAPI() {
      try {
        const response = await fetch(CHAMPION_DATA_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        allChampions = data.data;
        
        championKeyMap = {};
        Object.values(allChampions).forEach(champ => {
          championKeyMap[champ.name] = champ.id;
        });
        
        championList = Object.values(allChampions).sort((a, b) => 
          a.name.localeCompare(b.name, 'ru')
        );
        
        console.log(`✅ Загружено ${championList.length} чемпионов`);
        return true;
      } catch (error) {
        console.error('❌ Ошибка загрузки:', error);
        return false;
      }
    }

    // ✅ ПОЛУЧЕНИЕ URL ИКОНКИ
    function getChampionIconUrl(championId) {
      return `${CHAMPION_ICON_BASE}/${championId}.png`;
    }

    function init() {
      const urlParams = new URLSearchParams(window.location.search);
      draftId = urlParams.get('draft_id');
      mySide = urlParams.get('side');

      if (!draftId || !mySide) {
        alert("Неверная ссылка!");
        return;
      }

      initAPI().then(() => {
        loadChampionsFromAPI().then(success => {
          if (success) {
            loadingEl.style.display = 'none';
            renderChampions();
            setupEventListeners();
            syncAndRender();
            setInterval(syncAndRender, 1000);
          } else {
            loadingEl.innerHTML = '<h2 style="color: #ff6666;">Ошибка загрузки</h2>';
          }
        });
      });
    }

    // ✅ ОТРИСОВКА ЧЕМПИОНОВ С ФИЛЬТРАЦИЕЙ
    function renderChampions(roleFilter = "all") {
      container.innerHTML = '';
      
      let championsToShow = championList;
      
      if (roleFilter !== "all") {
        const roleIds = ROLE_CHAMPIONS[roleFilter] || [];
        championsToShow = championList.filter(champ => roleIds.includes(champ.id));
      }

      championsToShow.forEach(champ => {
        const cell = document.createElement("div");
        cell.classList.add("champion-cell");
        cell.dataset.champion = champ.name;
        cell.dataset.id = champ.id;

        const img = document.createElement("img");
        img.src = getChampionIconUrl(champ.id);
        img.alt = champ.name;
        img.onerror = () => { img.style.display = "none"; };

        const label = document.createElement("div");
        label.textContent = champ.name;

        cell.appendChild(img);
        cell.appendChild(label);
        container.appendChild(cell);
      });
    }

    function setupEventListeners() {
      // Фильтрация по ролям
      document.querySelectorAll(".role-cell").forEach(cell => {
        cell.addEventListener("click", (e) => {
          e.preventDefault();
          const role = cell.dataset.role;
          currentRoleFilter = role;
          
          document.querySelectorAll(".role-cell").forEach(c => c.classList.remove("active"));
          cell.classList.add("active");
          
          if (selectedCell) {
            selectedCell.classList.remove("selected");
            selectedCell = null;
          }
          
          renderChampions(role);
          
          const searchQuery = document.getElementById("search-input").value.trim().toLowerCase();
          if (searchQuery) {
            filterChampionsBySearch(searchQuery);
          }
        });
      });

      // Поиск
      document.getElementById("search-input").addEventListener("input", (e) => {
        const query = e.target.value.trim().toLowerCase();
        filterChampionsBySearch(query);
      });

      // Выбор чемпиона
      document.addEventListener("click", (e) => {
        const cell = e.target.closest(".champion-cell");
        if (!cell) return;
        
        if (selectedCell) selectedCell.classList.remove("selected");
        selectedCell = cell;
        confirmBtn.disabled = false;
      });

      confirmBtn.onclick = handleConfirm;
      readyBlueBtn.onclick = () => setReady("blue");
      readyRedBtn.onclick = () => setReady("red");

      captainLinkEl.onclick = () => {
        if (!draftId) return;
        const joinLink = `${window.location.origin}/join?draft_id=${draftId}`;
        copyTextToClipboard(joinLink, captainLinkEl);
      };

      spectatorLinkEl.onclick = () => {
        if (!draftId) return;
        const spectatorLink = `${window.location.origin}/draft?draft_id=${draftId}&side=spectator`;
        copyTextToClipboard(spectatorLink, spectatorLinkEl);
      };
    }

    function filterChampionsBySearch(query) {
      document.querySelectorAll(".champion-cell").forEach(cell => {
        const name = cell.dataset.champion.toLowerCase();
        const matchesSearch = name.includes(query);
        
        let matchesRole = true;
        if (currentRoleFilter !== "all") {
          const champId = cell.dataset.id;
          matchesRole = (ROLE_CHAMPIONS[currentRoleFilter] || []).includes(champId);
        }
        
        cell.style.display = (matchesSearch && matchesRole) ? "flex" : "none";
      });
    }

    async function copyTextToClipboard(text, element) {
      try {
        await navigator.clipboard.writeText(text);
        const originalText = element.textContent;
        element.textContent = "Скопировано!";
        element.style.color = "#5cb85c";
        setTimeout(() => {
          element.textContent = originalText;
          element.style.color = "#a0a0ff";
        }, 2000);
      } catch (err) {
        alert("Не удалось скопировать");
      }
    }

    async function syncAndRender() {
      try {
        const res = await fetch(`/api/draft/${draftId}`);
        if (!res.ok) return;
        state = await res.json();
        updateUI();
        updateLinkVisibility();
      } catch (e) {
        console.error("Sync error", e);
      }
    }

    function updateLinkVisibility() {
      if (!state || !draftId) return;

      if (state.phase === "lobby" || state.phase === "ready_check") {
        captainLinkEl.style.display = "block";
      } else {
        captainLinkEl.style.display = "none";
      }

      if (state.phase !== "lobby" && state.phase !== "ready_check") {
        spectatorLinkEl.style.display = "block";
      } else {
        spectatorLinkEl.style.display = "none";
      }
    }

    function updateUI() {
      if (!state) return;

      if (lastPhase !== state.phase) {
        lastPhase = state.phase;
        stopTimer();
        timeLeft = 35;
        timerEl.textContent = "--:--";
      }

      if (mySide === "blue") {
        readyBlueBtn.disabled = !(state.phase === "ready_check" && !iAmReady);
        readyRedBtn.style.display = "none";
      } else if (mySide === "red") {
        readyRedBtn.disabled = !(state.phase === "ready_check" && !iAmReady);
        readyBlueBtn.style.display = "none";
      }

      let phaseText = "";
      switch (state.phase) {
        case "lobby": phaseText = "Ожидание второй команды..."; break;
        case "ready_check": phaseText = "Подтвердите готовность"; break;
        case "banning_1": phaseText = "Фаза банов 1"; break;
        case "picking_1": phaseText = "Фаза пиков 1"; break;
        case "banning_2": phaseText = "Фаза банов 2"; break;
        case "picking_2": phaseText = "Фаза пиков 2"; break;
        case "finished": phaseText = "Драфт завершён!"; break;
        default: phaseText = "Драфт в процессе";
      }
      phaseInfo.textContent = phaseText;

      const isMyTurn = state.current_turn === mySide;
      const isActivePhase = ["banning_1", "picking_1", "banning_2", "picking_2"].includes(state.phase);
      confirmBtn.disabled = !isMyTurn || !isActivePhase || !selectedCell;

      updateSlots("blue", state.picks_blue);
      updateSlots("red", state.picks_red);

      const blueBans = state.bans.filter((_, i) => i % 2 === 0).slice(0, 5);
      const redBans = state.bans.filter((_, i) => i % 2 === 1).slice(0, 5);
      updateBans("blue", blueBans);
      updateBans("red", redBans);

      const bannedOrPicked = new Set([
        ...state.bans,
        ...state.picks_blue.filter(p => p),
        ...state.picks_red.filter(p => p)
      ]);
      
      document.querySelectorAll(".champion-cell").forEach(cell => {
        const name = cell.dataset.champion;
        if (bannedOrPicked.has(name)) {
          cell.classList.add("picked");
        } else {
          cell.classList.remove("picked");
        }
      });

      if (isActivePhase && isMyTurn) {
        if (lastTurn !== state.current_turn) {
          lastTurn = state.current_turn;
          startTimer();
        }
      } else {
        stopTimer();
        timerEl.textContent = "--:--";
        timeLeft = 35;
      }
    }

    // ✅ ОБНОВЛЕНИЕ СЛОТОВ С ИКОНКАМИ
    function updateSlots(side, picks) {
      const slots = document.querySelectorAll(`#team-${side}-picks .slot`);
      
      picks.forEach((champ, i) => {
        const slot = slots[i];
        slot.innerHTML = '';
        
        if (champ) {
          slot.classList.add("filled");
          
          const champId = championKeyMap[champ];
          if (champId) {
            const img = document.createElement("img");
            img.src = getChampionIconUrl(champId);
            img.alt = champ;
            img.onerror = () => { img.style.display = "none"; };
            
            const nameSpan = document.createElement("span");
            nameSpan.className = "champion-name";
            nameSpan.textContent = champ;
            
            slot.appendChild(img);
            slot.appendChild(nameSpan);
          } else {
            const nameSpan = document.createElement("span");
            nameSpan.className = "champion-name";
            nameSpan.textContent = champ;
            slot.appendChild(nameSpan);
          }
        } else {
          slot.classList.remove("filled");
          const roleSpan = document.createElement("span");
          roleSpan.textContent = ["TOP", "JG", "MID", "ADC", "SUP"][i];
          slot.appendChild(roleSpan);
        }
      });
    }

    // ✅ ОБНОВЛЕНИЕ БАНОВ С ИКОНКАМИ
    function updateBans(side, bans) {
      const slots = document.querySelectorAll(`#team-${side}-bans .slot`);
      
      bans.forEach((champ, i) => {
        const slot = slots[i];
        slot.innerHTML = '';
        
        if (champ) {
          slot.classList.add("filled");
          
          const champId = championKeyMap[champ];
          if (champId) {
            const img = document.createElement("img");
            img.src = getChampionIconUrl(champId);
            img.alt = champ;
            img.onerror = () => { img.style.display = "none"; };
            
            const nameSpan = document.createElement("span");
            nameSpan.className = "champion-name";
            nameSpan.textContent = champ;
            
            slot.appendChild(img);
            slot.appendChild(nameSpan);
          } else {
            const nameSpan = document.createElement("span");
            nameSpan.className = "champion-name";
            nameSpan.textContent = champ;
            slot.appendChild(nameSpan);
          }
        } else {
          slot.classList.remove("filled");
          const banSpan = document.createElement("span");
          banSpan.textContent = `BAN ${i + 1}`;
          slot.appendChild(banSpan);
        }
      });
      
      for (let i = bans.length; i < 5; i++) {
        const slot = slots[i];
        slot.innerHTML = '';
        slot.classList.remove("filled");
        const banSpan = document.createElement("span");
        banSpan.textContent = `BAN ${i + 1}`;
        slot.appendChild(banSpan);
      }
    }

    // ✅ СТАБИЛЬНЫЙ ТАЙМЕР
    function startTimer() {
      timeLeft = 35;
      timerRunning = true;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) stopTimer();
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      timerRunning = false;
    }

    async function setReady(side) {
      if (side !== mySide) return;
      try {
        await fetch(`/api/draft/${draftId}/ready`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ team: side })
        });
        iAmReady = true;
        updateUI();
      } catch (e) {
        console.error("Ready error", e);
      }
    }

    async function handleConfirm() {
      if (!selectedCell) return;
      const championName = selectedCell.dataset.champion;

      selectedCell.classList.add("picked");
      selectedCell.style.pointerEvents = "none";
      selectedCell = null;

      try {
        await fetch(`/api/draft/${draftId}/action`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ champion: championName })
        });
      } catch (e) {
        document.querySelectorAll(".champion-cell").forEach(cell => {
          if (cell.dataset.champion === championName) {
            cell.classList.remove("picked");
            cell.style.pointerEvents = "";
          }
        });
        document.getElementById("result").textContent = "Ошибка!";
      }
    }

    window.onload = init;
  </script>
</body>
</html>
