<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создать драфт — LoL</title>
  <style>
    body {
      background: #0f0f1b;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-container {
      background: #1a1a2e;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(100, 0, 255, 0.4);
      width: 320px;
      text-align: center;
    }
    h1 {
      color: #c9a0ff;
      margin-bottom: 20px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #444;
      border-radius: 6px;
      background: #22223a;
      color: #e0e0ff;
      box-sizing: border-box;
    }
    button {
      background: linear-gradient(to bottom, #4a90e2, #2a5db0);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover {
      background: linear-gradient(to bottom, #5aa0f2, #3a6dc0);
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Создать драфт-комнату</h1>
    <input type="text" id="team-name" placeholder="Название вашей команды" required>
    <select id="side-select">
      <option value="blue">Blue Team</option>
      <option value="red">Red Team</option>
    </select>
    <button onclick="createDraft()">Создать и начать</button>
  </div>

  <script>
    async function createDraft() {
      const teamName = document.getElementById('team-name').value.trim();
      const side = document.getElementById('side-select').value;

      if (!teamName) {
        alert("Введите название команды");
        return;
      }

      try {
        const res = await fetch('/api/draft', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ team_name: teamName, side: side })
        });
        const data = await res.json();

        // Сразу переходим на страницу драфта
        window.location.href = `/draft?draft_id=${data.draft_id}&side=${data.side}`;
      } catch (e) {
        alert("Ошибка при создании комнаты");
        console.error(e);
      }
    }
  </script>
</body>
</html>
